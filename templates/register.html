<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: url('https://images.unsplash.com/photo-1500937386664-56d1dfef3854') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
        }

        .overlay {
            background: rgba(0, 0, 0, 0.65);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            width: 100%;
            max-width: 400px;
        }
    </style>
</head>

<body>

<div class="overlay">
    <div class="card-box shadow">
        <h4 class="text-center mb-3">Create Account</h4>

        <form method="POST">
            <input class="form-control mb-3" type="text" name="username" placeholder="Username" required>

            <div class="input-group mb-3">
                <input class="form-control" type="password" name="password" id="password" placeholder="Password" required>
                <button class="btn btn-outline-secondary" type="button" onclick="togglePassword()">👁️</button>
            </div>

            <button class="btn btn-success w-100">Register</button>
        </form>
    </div>
</div>

<script>
function togglePassword() {
    var pass = document.getElementById("password");
    pass.type = pass.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
