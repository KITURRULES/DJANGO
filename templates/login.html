<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Farmer Login | Agri Assistant</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <style>
        body {
            background: url('https://images.unsplash.com/photo-1500937386664-56d1dfef3854') no-repeat center center/cover;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0, 80, 0, 0.65);
        }

        .login-card {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 420px;
            background: white;
            border-radius: 15px;
            padding: 35px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-control {
            border-radius: 30px;
            padding-left: 45px;
        }

        .input-icon {
            position: absolute;
            top: 10px;
            left: 18px;
            color: #888;
        }

        .toggle-password {
            position: absolute;
            right: 18px;
            top: 10px;
            cursor: pointer;
            color: #666;
        }

        .btn-agri {
            background: #2e7d32;
            color: white;
            border-radius: 30px;
        }

        .btn-agri:hover {
            background: #1b5e20;
        }

        .brand {
            text-align: center;
            margin-bottom: 25px;
            font-weight: bold;
            font-size: 22px;
            color: #2e7d32;
        }
    </style>
</head>
<body>

<div class="overlay"></div>

<div class="login-card">
    <div class="brand">
        🌾 Agri Assistant Login
    </div>

    <form method="POST" action="/login">

        <!-- Username -->
        <div class="mb-3 position-relative">
            <i class="fa fa-user input-icon"></i>
            <input type="text" name="username" class="form-control" placeholder="Username" required>
        </div>

        <!-- Password -->
        <div class="mb-3 position-relative">
            <i class="fa fa-lock input-icon"></i>
            <input type="password" id="password" name="password" class="form-control" placeholder="Password" required>
            <i class="fa fa-eye toggle-password" onclick="togglePassword()"></i>
        </div>

        <!-- Remember me -->
        <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input" id="remember">
            <label class="form-check-label" for="remember">Remember me</label>
        </div>

        <button type="submit" class="btn btn-agri w-100">Login</button>

        <div class="text-center mt-3">
            Don't have an account?
            <a href="/register">Register here</a>
        </div>
    </form>
</div>

<script>
function togglePassword() {
    const password = document.getElementById("password");
    password.type = password.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
